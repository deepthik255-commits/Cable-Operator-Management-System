<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All DTH Subscriptions</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(120deg, #e0e7ff 0%, #f4f4f4 100%);
      margin: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 950px;
      margin: 40px auto;
      background: #fff;
      padding: 32px 28px 28px 28px;
      border-radius: 14px;
      box-shadow: 0 6px 32px 0 rgba(0, 123, 255, 0.13), 0 1.5px 6px #aaa;
      animation: fadeIn 1s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(40px);}
      to { opacity: 1; transform: translateY(0);}
    }
    h2 {
      text-align: center;
      color: #007bff;
      letter-spacing: 1px;
      margin-bottom: 18px;
      font-size: 2.2rem;
      font-weight: 600;
      text-shadow: 0 2px 8px #e0e7ff;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 20px;
      background: #f9fbff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px #e0e7ff;
      transition: box-shadow 0.3s;
    }
    th, td {
      padding: 14px 14px;
      text-align: left;
      font-size: 1rem;
      transition: background 0.3s, color 0.3s;
    }
    th {
      background: linear-gradient(90deg, #007bff 80%, #4f8cff 100%);
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.5px;
      border: none;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    tr {
      opacity: 0;
      animation: rowFadeIn 0.6s forwards;
    }
    @keyframes rowFadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
    tr:nth-child(even) td {
      background: #f0f5ff;
    }
    tr:nth-child(odd) td {
      background: #ffffff;
    }
    tbody tr:hover td {
      background: #e3f0ff;
      color: #007bff;
      transition: background 0.3s, color 0.3s;
      cursor: pointer;
    }
    td {
      border: none;
      border-bottom: 1px solid #e3e8f0;
    }
    td:last-child, th:last-child {
      border-right: none;
    }
    #message {
      color: #d32f2f;
      text-align: center;
      margin-top: 18px;
      font-size: 1.1rem;
      font-weight: 500;
      min-height: 22px;
      transition: color 0.4s;
    }
    @media (max-width: 700px) {
      .container { padding: 12px 4px;}
      table, th, td { font-size: 0.95rem;}
      h2 { font-size: 1.3rem;}
      th, td { padding: 8px 6px;}
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>All DTH Subscriptions</h2>
    <table id="subsTable">
      <thead>
        <tr>
          <th>Customer ID</th>
          <th>Name</th>
          <th>DTH Provider</th>
          <th>Subscription Duration</th>
          <th>Channels/Packs</th>
        </tr>
      </thead>
      <tbody>
        <!-- Data will be inserted here -->
      </tbody>
    </table>
    <div id="message"></div>
  </div>
  <script>
    function durationText(d) {
      if (d == 1) return 'Monthly';
      if (d == 3) return 'Quarterly';
      if (d == 12) return 'Yearly';
      return d + ' months';
    }

    function animateRows() {
      // Remove and re-add animation to trigger on update
      const rows = document.querySelectorAll('#subsTable tbody tr');
      rows.forEach((row, idx) => {
        row.style.animationDelay = (idx * 0.08) + 's';
        row.classList.remove('row-animate');
        void row.offsetWidth; // trigger reflow
        row.classList.add('row-animate');
      });
    }

    async function fetchSubscriptions() {
      try {
        const res = await fetch('/api/subscriptions');
        if (!res.ok) throw new Error('Failed to fetch');
        const data = await res.json();
        const tbody = document.querySelector('#subsTable tbody');
        tbody.innerHTML = '';
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No subscriptions found.</td></tr>';
        } else {
          data.forEach(sub => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${sub.customerId || '-'}</td>
              <td>${sub.name || '-'}</td>
              <td>${sub.provider || '-'}</td>
              <td>${durationText(sub.duration)}</td>
              <td>${Array.isArray(sub.packs) ? sub.packs.join(', ') : '-'}</td>
            `;
            tbody.appendChild(tr);
          });
        }
        document.getElementById('message').textContent = '';
        animateRows();
      } catch (err) {
        document.getElementById('message').textContent = 'Could not load subscriptions!';
      }
    }

    // Initial fetch and auto-refresh every 10 seconds
    document.addEventListener('DOMContentLoaded', () => {
      fetchSubscriptions();
      setInterval(fetchSubscriptions, 10000);
    });
  </script>
</body>
</html>
