<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Account</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="adminStyling1.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      background-color: #f4f4f4;
    }

    .sidebar {
      width: 240px;
      background-color: #2c3e50;
      color: #fff;
      height: 100vh;
      position: fixed;
      overflow-y: auto;
    }

    .sidebar h2 {
      text-align: center;
      padding: 20px 0;
      margin: 0;
      font-size: 22px;
      background-color: #1abc9c;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      border-bottom: 1px solid #34495e;
    }

    .sidebar ul li a {
      color: #ecf0f1;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 15px 20px;
      transition: background 0.3s;
    }

    .sidebar ul li a:hover {
      background-color: #34495e;
    }

    .sidebar ul li a i {
      margin-right: 12px;
    }

    .container {
      margin-left: 240px;
      padding: 30px;
      width: 100%;
    }

    .container h1 {
      margin-bottom: 20px;
    }

    #account-details {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #account-details h2 {
      margin-bottom: 20px;
    }

    form input, form select, form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      opacity: 0;
    }

    form button {
      padding: 10px 20px;
      background-color: #1abc9c;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    form button:hover {
      background-color: #16a085;
    }

    #logout-btn {
      margin-top: 20px;
      background-color: #e74c3c;
    }

    #logout-btn:hover {
      background-color: #c0392b;
    }

    /* Fade-in animation */
    .fade-in {
      animation: fadeInUp 0.5s ease forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 60px;
      }

      .sidebar h2,
      .sidebar ul li a span {
        display: none;
      }

      .container {
        margin-left: 60px;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2><i class="fas fa-broadcast-tower"></i>  user Dashboard</h2>
    <ul>
      <li><a href="userdashboard.html"><i class="fas fa-users"></i><span>Dashboard</span></a></li>
      <li><a href="useraccount.html"><i class="fas fa-user"></i> <span>Profile</span></a></li>
      <li><a href="usersubscription.html"><i class="fas fa-tv"></i> <span>Subscription</span></a></li>
      <li><a href="userbilling.html"><i class="fas fa-file-invoice-dollar"></i> <span>Billing</span></a></li>
      <li><a href="usernotifications.html"><i class="fas fa-bell"></i> <span>Notifications</span></a></li>
      <li><a href="userplans.html"><i class="fas fa-sliders-h"></i> <span>Manage Plans</span></a></li>
      <li><a href="usersupport.html"><i class="fas fa-headset"></i> <span>Support</span></a></li>
      <li><a href="usercomplaints.html"><i class="fas fa-comment-dots"></i> <span>Complaint Box</span></a></li>
      <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="container">
    <h1>User Account</h1>

    <div id="account-details">
      <h2>Account Overview</h2>
      <form id="account-form">
        <input type="text" id="name" name="name" placeholder="Name" required>
        <input type="email" id="email" name="email" placeholder="Email" required>
        <input type="text" id="phone" name="phone" placeholder="Phone" required>
        <input type="text" id="address" name="address" placeholder="Address" required>
        <input type="text" id="city" name="city" placeholder="City" required>
        <input type="text" id="zip" name="zip" placeholder="ZIP Code" required>
        <input type="text" id="package" name="package" placeholder="Package" required>
        <input type="date" id="connectionDate" name="connectionDate" placeholder="Connection Date" required>
        <button type="submit" id="update-btn">Update</button>
      </form>
    </div>

    <button id="logout-btn">Logout</button>
  </div>

  <script>
    // Fetch user data and populate form with animations
    function fetchUserData() {
      fetch('/get-user-details')
        .then(response => response.json())
        .then(data => {
          if (data.message) {
            alert(data.message);
            window.location.href = '/userlogin.html';
          } else {
            const fields = [
              { id: 'name', value: data.name || '' },
              { id: 'email', value: data.email || '' },
              { id: 'phone', value: data.phone || '' },
              { id: 'address', value: data.address || '' },
              { id: 'city', value: data.city || '' },
              { id: 'zip', value: data.zip || '' },
              { id: 'package', value: data.package || '' },
              { id: 'connectionDate', value: data.connectionDate ? new Date(data.connectionDate).toISOString().split('T')[0] : '' }
            ];

            fields.forEach((field, index) => {
              const element = document.getElementById(field.id);
              setTimeout(() => {
                element.value = field.value;
                element.classList.add('fade-in');
              }, index * 150); // Delay of 150ms per field
            });
          }
        })
        .catch(error => {
          console.error('Error fetching user details:', error);
          alert('Failed to fetch user details.');
        });
    }

    // Update user details
    function updateUserDetails(event) {
      event.preventDefault();

      const updatedData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        zip: document.getElementById('zip').value,
        package: document.getElementById('package').value,
        connectionDate: document.getElementById('connectionDate').value
      };

      fetch('/update-user', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(updatedData)
      })
      .then(response => response.json())
      .then(data => {
        alert(data.message || 'Account updated successfully!');
      })
      .catch(error => {
        console.error('Error updating user:', error);
        alert('Failed to update user details.');
      });
    }

    // Logout
    function logout() {
      fetch('/logout')
        .then(() => window.location.href = '/')
        .catch(error => console.error('Error during logout:', error));
    }

    document.getElementById('account-form').addEventListener('submit', updateUserDetails);
    document.getElementById('logout-btn').addEventListener('click', logout);

    window.onload = fetchUserData;
  </script>
</body>
</html>
