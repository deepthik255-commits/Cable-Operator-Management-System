<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cable Operator Management System</title>6
  <style>
     /* CSS RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  color: #e0e6f3;
}

/* Header */
header {
  background: rgba(10, 25, 47, 0.95);
  box-shadow: 0 0 20px #00f0ffaa;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28px 60px 28px 40px;
  color: #a0d8ef;
  position: relative;
  z-index: 10;
  border-bottom: 2px solid #00f0ff88;
  font-weight: 600;
}

#logo img {
  height: 60px;
  border-radius: 14px;
  box-shadow:
    0 0 8px #00f0ffcc,
    0 0 20px #00f0ff88;
  border: 2px solid #00f0ffcc;
  background: #0a192f;
  transition: transform 0.3s ease;
}

#logo img:hover {
  transform: rotate(10deg) scale(1.05);
}

header h1 {
  font-size: 2.2rem;
  letter-spacing: 3px;
  font-weight: 700;
  margin-left: 20px;
  text-shadow:
    0 0 6px #00f0ffaa,
    0 0 12px #00f0ff88;
  flex: 1;
  user-select: none;
}

nav ul {
  display: flex;
  list-style: none;
  gap: 32px;
}

nav ul li a {
  color: #a0d8ef;
  text-decoration: none;
  font-weight: 600;
  font-size: 1.1rem;
  padding: 10px 18px;
  border-radius: 10px;
  transition:
    background 0.3s ease,
    color 0.3s ease,
    box-shadow 0.3s ease;
  user-select: none;
}

nav ul li a:hover,
nav ul li a:focus {
  background: #00f0ffdd;
  color: #0a192f;
  box-shadow:
    0 0 8px #00f0ffbb,
    0 0 12px #00f0ff88;
  outline: none;
}

/* Main Section */
main {
  flex: 1;
  position: relative;
  background: url('index2img.jpg') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 20px;
  overflow: hidden;
}

main .overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(15, 32, 43, 0.85);
  backdrop-filter: blur(8px);
  z-index: 1;
  box-shadow: inset 0 0 80px #00f0ffbb;
}

/* Glassmorphism Card */
main .content {
  position: relative;
  z-index: 2;
  background: rgba(10, 25, 47, 0.75);
  border-radius: 28px;
  box-shadow:
    0 0 10px #00f0ffcc,
    0 0 30px #00f0ff99;
  backdrop-filter: blur(12px);
  border: 1.8px solid #00f0ff88;
  padding: 56px 48px 48px 48px;
  max-width: 440px;
  width: 100%;
  text-align: center;
  color: #c0e8ff;
  animation: fadeInCard 1.4s cubic-bezier(.23,1.04,.52,1) 0.3s both;
}

@keyframes fadeInCard {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: none;
  }
}

main .content h1 {
  font-size: 2.4rem;
  margin-bottom: 18px;
  color: #00f0ff;
  text-shadow:
    0 0 8px #00f0ffcc,
    0 0 16px #00f0ffbb;
  letter-spacing: 2px;
  user-select: none;
}

main .content p {
  font-size: 1.15rem;
  margin-bottom: 36px;
  color: #a0d8efcc;
  font-weight: 400;
  user-select: none;
}

/* Buttons as Neon Cards */
.buttons {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 170px;
  justify-content: center;
  padding: 18px 28px;
  font-size: 1.15rem;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  transition:
    box-shadow 0.3s ease,
    transform 0.2s ease,
    background 0.3s ease;
  text-decoration: none;
  font-weight: 700;
  user-select: none;
  position: relative;
  overflow: hidden;
  color: #0a192f;
  box-shadow:
    0 0 12px #00f0ffcc,
    0 0 24px #00f0ff88;
  background: linear-gradient(135deg, #00f0ff, #00c8ff);
  text-shadow: 0 0 6px #00f0ffbb;
}

.btn-user {
  background: linear-gradient(135deg, #00ff94, #00d68f);
  box-shadow:
    0 0 14px #00ff94cc,
    0 0 28px #00ff94aa;
  color: #0a192f;
  text-shadow: 0 0 6px #00ff94aa;
}

.btn-admin {
  background: linear-gradient(135deg, #ff5f6d, #ffc371);
  box-shadow:
    0 0 14px #ff5f6dcc,
    0 0 28px #ff5f6daa;
  color: #0a192f;
  text-shadow: 0 0 6px #ff5f6daa;
}

.btn-register {
  background: linear-gradient(135deg, #ffd200, #f7971e);
  box-shadow:
    0 0 14px #ffd200cc,
    0 0 28px #ffd200aa;
  color: #0a192f;
  text-shadow: 0 0 6px #ffd200aa;
}

.btn:hover {
  transform: translateY(-4px) scale(1.07);
  box-shadow:
    0 0 20px #00f0ffdd,
    0 0 40px #00f0ffbb;
  opacity: 1;
  text-shadow: 0 0 10px #00f0ffee;
}

/* Neon glow icons */
.btn-user::before {
  content: "👤";
  font-size: 1.3em;
  margin-right: 8px;
  filter: drop-shadow(0 0 2px #00ff94);
}

.btn-admin::before {
  content: "🛡️";
  font-size: 1.3em;
  margin-right: 8px;
  filter: drop-shadow(0 0 2px #ff5f6d);
}

.btn-register::before {
  content: "📝";
  font-size: 1.3em;
  margin-right: 8px;
  filter: drop-shadow(0 0 2px #ffd200);
}

/* Footer */
footer {
  background: rgba(10, 25, 47, 0.95);
  color: #a0d8efcc;
  text-align: center;
  padding: 20px 0 16px 0;
  font-size: 1rem;
  letter-spacing: 1.2px;
  box-shadow: 0 -2px 14px #00f0ff55;
  user-select: none;
}

/* Responsive */
@media (max-width: 720px) {
  header {
    flex-direction: column;
    gap: 14px;
    padding: 22px 20px;
  }
  header h1 {
    font-size: 1.4rem;
    margin-left: 0;
    text-align: center;
  }
  nav ul {
    gap: 16px;
  }
  main .content {
    padding: 40px 20px 32px 20px;
    max-width: 95vw;
  }
  .btn {
    min-width: 140px;
    font-size: 1rem;
    padding: 14px 16px;
  }
}



  </style>
