<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User Login - Cable Management</title>
    <style>
        body {
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #2e1a47 0%, #3a2a6a 60%, #1ca7b8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url('https://goldenfairy.in/slider/1.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0.13;
            z-index: 0;
        }
        .login-container {
            position: relative;
            z-index: 1;
            background: rgba(38, 24, 66, 0.85);
            padding: 2.5rem 2rem 2rem 2rem;
            border-radius: 22px;
            box-shadow: 0 6px 32px 0 #6bd1e9aa, 0 0 0 2px #6bd1e988;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(6px);
            color: #e0e6f3;
            animation: fadeInCard 1.1s cubic-bezier(.23,1.04,.52,1) 0.1s both;
        }
        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(30px) scale(0.97);}
            to { opacity: 1; transform: none;}
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 1.7rem;
            color: #6bd1e9;
            font-size: 2rem;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #6bd1e9cc, 0 0 16px #6bd1e9aa;
            user-select: none;
        }
        .input-group {
            margin-bottom: 1.3rem;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #a0d8ef;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #6bd1e988;
            border-radius: 10px;
            background: rgba(255,255,255,0.09);
            color: #e0e6f3; /* Changed input text color for better visibility */
            font-size: 1rem;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus {
            border: 1.5px solid #a16be9;
            box-shadow: 0 0 8px #a16be9aa;
            background: rgba(255,255,255,0.18);
        }
        button {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
            color: #271a48;
            border: none;
            border-radius: 10px;
            margin-top: 1.1rem;
            cursor: pointer;
            font-size: 1.15rem;
            font-weight: 700;
            box-shadow: 0 4px 18px #6bd1e966;
            transition: background 0.3s, transform 0.18s, box-shadow 0.23s;
            letter-spacing: 1px;
            text-shadow: 0 0 6px #fff4;
        }
        button:hover {
            background: linear-gradient(90deg, #a16be9 0%, #6bd1e9 100%);
            color: #fff;
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 8px 32px #a16be988;
        }
        .forgot-password {
            text-align: center;
            margin-top: 1.3rem;
        }
        .forgot-password a {
            color: #a16be9;
            text-decoration: none;
            font-size: 0.97rem;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }
        .forgot-password a:hover {
            color: #6bd1e9;
            text-decoration: underline;
        }
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: rgba(38, 24, 66, 0.97);
            padding: 2rem 1.2rem 1.2rem 1.2rem;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }
        .close {
            position: absolute;
            right: 1rem;
            top: 1rem;
            color: #6bd1e9;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        .message {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.95rem;
            color: #a0d8ef;
        }
        @media (max-width: 500px) {
            .login-container {
                padding: 1.2rem 0.5rem 1.5rem 0.5rem;
                max-width: 98vw;
            }
            .login-container h2 {
                font-size: 1.4rem;
            }
            .modal-content {
                padding: 1.2rem 0.3rem 1rem 0.3rem;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>User Login</h2>
    <form action="/userlogin" method="POST">
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required />
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required />
        </div>
        <button type="submit">Login</button>
        <div class="forgot-password">
            <a id="forgotPasswordLink">Forgot Password?</a>
        </div>
    </form>
</div>

<div id="otpModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModalBtn">&times;</span>
        <div class="modal-steps">
            <div class="step step1 active">
                <h3 style="text-align:center;color:#6bd1e9;">Reset Password</h3>
                <div class="input-group">
                    <label for="resetEmail">Registered Email</label>
                    <input type="email" id="resetEmail" required>
                </div>
                <button type="button" onclick="sendOTP()">Send OTP</button>
                <p id="emailMessage" class="message"></p>
            </div>
            <div class="step step2">
                <h3 style="text-align:center;color:#6bd1e9;">Verify OTP</h3>
                <div class="input-group">
                    <label for="otp">Enter OTP</label>
                    <input type="text" id="otp" maxlength="6" required>
                </div>
                <div class="input-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required>
                </div>
                <button type="button" onclick="verifyOTP()">Reset Password</button>
                <p id="otpMessage" class="message"></p>
            </div>
        </div>
    </div>
</div>
<script>
    // Ensure this URL matches your Express server's address and port
    const BACKEND_URL = 'http://localhost:3000';

    // Modal logic
    function showModal() {
        document.getElementById('otpModal').style.display = 'flex';
        document.querySelector('.step1').classList.add('active');
        document.querySelector('.step2').classList.remove('active');
        document.getElementById('resetEmail').value = '';
        document.getElementById('otp').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('emailMessage').textContent = '';
        document.getElementById('otpMessage').textContent = '';
    }
    function closeModal() {
        document.getElementById('otpModal').style.display = 'none';
        // Optional: Reload the page or clear form after closing modal
        // window.location.reload();
    }
    document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
        e.preventDefault();
        showModal();
    });
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);

    // OTP step logic
    async function sendOTP() {
        const email = document.getElementById('resetEmail').value.trim();
        const messageEl = document.getElementById('emailMessage');
        messageEl.textContent = 'Sending OTP...'; // User feedback
        messageEl.style.color = '#a0d8ef'; // Default color

        if (!email) {
            messageEl.style.color = '#e57373';
            messageEl.textContent = 'Please enter your registered email.';
            return;
        }
        try {
            const response = await fetch(`${BACKEND_URL}/user/send-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const result = await response.json();
            if (response.ok) {
                messageEl.style.color = '#6bd1e9';
                messageEl.textContent = 'OTP sent to your email!';
                setTimeout(() => {
                    document.querySelector('.step1').classList.remove('active');
                    document.querySelector('.step2').classList.add('active');
                    messageEl.textContent = ''; // Clear message after transition
                }, 900);
            } else {
                messageEl.style.color = '#e57373';
                messageEl.textContent = result.error || 'Error sending OTP';
            }
        } catch (err) {
            console.error('Network error during sendOTP:', err); // Specific error message for debugging
            messageEl.style.color = '#e57373';
            messageEl.textContent = 'Network error. Please ensure the server is running and accessible.';
        }
    }

    async function verifyOTP() {
        const email = document.getElementById('resetEmail').value.trim();
        const otp = document.getElementById('otp').value.trim();
        const newPassword = document.getElementById('newPassword').value;
        const messageEl = document.getElementById('otpMessage');
        messageEl.textContent = 'Resetting password...'; // User feedback
        messageEl.style.color = '#a0d8ef'; // Default color

        if (!email || !otp || !newPassword) {
            messageEl.style.color = '#e57373';
            messageEl.textContent = 'Please enter email, OTP and new password.';
            return;
        }
        if (newPassword.length < 6) { // Example: Basic password length validation
            messageEl.style.color = '#e57373';
            messageEl.textContent = 'New password must be at least 6 characters long.';
            return;
        }

        try {
            const response = await fetch(`${BACKEND_URL}/user/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp, newPassword })
            });
            const result = await response.json();
            if (response.ok) {
                messageEl.style.color = '#6bd1e9';
                messageEl.textContent = 'Password reset successfully! Redirecting...';
                setTimeout(() => {
                    closeModal(); // Close modal first
                    window.location.reload(); // Then reload the page
                }, 1800);
            } else {
                messageEl.style.color = '#e57373';
                messageEl.textContent = result.error || 'Error resetting password';
            }
        } catch (err) {
            console.error('Network error during verifyOTP:', err); // Specific error message for debugging
            messageEl.style.color = '#e57373';
            messageEl.textContent = 'Network error. Please ensure the server is running and accessible.';
        }
    }

</script>
</body>
</html>
