<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All DTH Subscriptions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #2e1a47 0%, #3a2a6a 70%, #1ca7b8 100%);
      margin: 0;
      min-height: 100vh;
      display: flex;
    }
    /* Sidebar Styling */
    .sidebar {
      width: 240px;
      background: rgba(38, 24, 66, 0.97);
      color: #e0e6f3;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      overflow-y: auto;
      box-shadow: 2px 0 18px #6bd1e933;
      z-index: 10;
      transition: width 0.3s;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .sidebar h2 {
      text-align: center;
      padding: 28px 0 22px 0;
      margin: 0;
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
      color: #2e1a47;
      letter-spacing: 1px;
      border-bottom: 1px solid #6bd1e933;
      text-shadow: 0 0 10px #6bd1e944;
      width: 100%;
    }
    .sidebar h2 i {
      margin-right: 10px;
      color: #a16be9;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
      width: 100%;
    }
    .sidebar ul li {
      border-bottom: 1px solid #3a2a6a;
    }
    .sidebar ul li a {
      color: #e0e6f3;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 15px 24px;
      font-size: 1.08rem;
      border-radius: 8px 20px 20px 8px;
      transition: background 0.22s, color 0.22s, box-shadow 0.22s;
      position: relative;
    }
    .sidebar ul li a i {
      margin-right: 14px;
      font-size: 1.18rem;
      color: #6bd1e9;
      min-width: 22px;
      text-align: center;
    }
    .sidebar ul li a:hover,
    .sidebar ul li a:focus {
      background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
      color: #2e1a47;
      box-shadow: 0 4px 18px #a16be955;
      outline: none;
    }
    .sidebar ul li a:hover i,
    .sidebar ul li a:focus i {
      color: #2e1a47;
    }
    .sidebar ul li:last-child {
      border-bottom: none;
    }

    /* Main Content Alignment */
    .container {
      max-width: 950px;
      margin: 40px auto 40px 270px;
      background: #fff;
      padding: 32px 28px 28px 28px;
      border-radius: 14px;
      box-shadow: 0 6px 32px 0 rgba(0, 123, 255, 0.13), 0 1.5px 6px #aaa;
      animation: fadeIn 1s;
      min-height: 80vh;
      width: 100%;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(40px);}
      to { opacity: 1; transform: translateY(0);}
    }
    h2 {
      text-align: center;
      color: #6bd1e9;
      letter-spacing: 1px;
      margin-bottom: 18px;
      font-size: 2.2rem;
      font-weight: 700;
      text-shadow: 0 2px 8px #e0e7ff;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 20px;
      background: #f9fbff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px #e0e7ff;
      transition: box-shadow 0.3s;
    }
    th, td {
      padding: 14px 14px;
      text-align: left;
      font-size: 1rem;
      transition: background 0.3s, color 0.3s;
    }
    th {
      background: linear-gradient(90deg, #6bd1e9 80%, #a16be9 100%);
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.5px;
      border: none;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    tr {
      opacity: 0;
      animation: rowFadeIn 0.6s forwards;
    }
    @keyframes rowFadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
    tr:nth-child(even) td {
      background: #f0f5ff;
    }
    tr:nth-child(odd) td {
      background: #ffffff;
    }
    tbody tr:hover td {
      background: #e3f0ff;
      color: #6bd1e9;
      transition: background 0.3s, color 0.3s;
      cursor: pointer;
    }
    td {
      border: none;
      border-bottom: 1px solid #e3e8f0;
    }
    td:last-child, th:last-child {
      border-right: none;
    }
    #message {
      color: #d32f2f;
      text-align: center;
      margin-top: 18px;
      font-size: 1.1rem;
      font-weight: 500;
      min-height: 22px;
      transition: color 0.4s;
    }
    @media (max-width: 900px) {
      .sidebar {
        width: 70px;
        min-width: 70px;
      }
      .sidebar h2,
      .sidebar ul li a span {
        display: none;
      }
      .container {
        margin-left: 90px;
        padding: 24px 0;
      }
      table, th, td {
        font-size: 0.98rem;
      }
      th, td {
        padding: 10px 4px;
      }
      h2 {
        font-size: 1.4rem;
      }
    }
    @media (max-width: 700px) {
      .container {
        padding: 12px 4px;
        max-width: 99vw;
        margin: 0 2vw 24px 2vw;
      }
      table, th, td {
        font-size: 0.93rem;
      }
      th, td {
        padding: 8px 2px;
      }
      h2 {
        font-size: 1.2rem;
        margin-top: 70px;
      }
    }
    @media (max-width: 600px) {
      .sidebar {
        position: fixed;
        width: 100vw;
        min-width: 0;
        height: 60px;
        min-height: 0;
        flex-direction: row;
        align-items: center;
        top: 0;
        left: 0;
        box-shadow: 0 2px 14px #6bd1e933;
        z-index: 15;
      }
      .sidebar h2 {
        display: none;
      }
      .sidebar ul {
        display: flex;
        flex-direction: row;
        width: 100vw;
        justify-content: space-around;
        align-items: center;
      }
      .sidebar ul li {
        margin: 0;
        border-bottom: none;
      }
      .sidebar ul li a {
        border-radius: 10px;
        padding: 0.5rem 0.5rem;
        font-size: 1.08rem;
      }
      .container {
        margin-left: 0;
        margin-top: 70px;
        padding: 1.2rem 0.5rem;
        align-items: stretch;
      }
      table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
      th, td {
        min-width: 100px;
      }
    }
  </style>
</head>
<body>
<!-- Sidebar -->
<div class="sidebar">
  <h2><i class="fas fa-broadcast-tower"></i> ADMIN PANEL</h2>
  <ul>
    <li><a href="admindashboard.html"><i class="fas fa-users"></i><span>Dashboard</span></a></li>
    <li><a href="admincustomers.html"><i class="fas fa-users"></i><span>Customers</span></a></li>
    <li><a href="admincustomerreceipt.html"><i class="fas fa-receipt"></i><span>Customer Receipt</span></a></li>
    <li><a href="adminpackage.html"><i class="fas fa-box"></i><span>Packages</span></a></li>
    <li><a href="admincomplaints.html"><i class="fas fa-exclamation-circle"></i><span>Customer Complaint</span></a></li>
    <li><a href="/logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
  </ul>
</div>
<div class="container">
  <h2>All DTH Subscriptions</h2>
  <table id="subsTable">
    <thead>
      <tr>
        <th>Customer ID</th>
        <th>Name</th>
        <th>DTH Provider</th>
        <th>Subscription Duration</th>
        <th>Channels/Packs</th>
        <th>Start Date</th>
        <th>End Date</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data will be inserted here -->
    </tbody>
  </table>
  <div id="message"></div>
</div>
<script>
  function durationText(d) {
    if (d == 1) return 'Monthly';
    if (d == 3) return 'Quarterly';
    if (d == 12) return 'Yearly';
    return d + ' months';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '-';
    return d.toISOString().substring(0, 10);
  }

  function animateRows() {
    const rows = document.querySelectorAll('#subsTable tbody tr');
    rows.forEach((row, idx) => {
      row.style.animationDelay = (idx * 0.08) + 's';
      row.classList.remove('row-animate');
      void row.offsetWidth;
      row.classList.add('row-animate');
    });
  }

  async function fetchSubscriptions() {
    try {
      const res = await fetch('/api/subscriptions');
      if (!res.ok) throw new Error('Failed to fetch');
      const data = await res.json();
      const tbody = document.querySelector('#subsTable tbody');
      tbody.innerHTML = '';
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No subscriptions found.</td></tr>';
      } else {
        data.forEach(sub => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${sub.customerId || '-'}</td>
            <td>${sub.name || '-'}</td>
            <td>${sub.provider || '-'}</td>
            <td>${durationText(sub.duration)}</td>
            <td>${Array.isArray(sub.packs) ? sub.packs.join(', ') : '-'}</td>
            <td>${formatDate(sub.startDate)}</td>
            <td>${formatDate(sub.endDate)}</td>
          `;
          tbody.appendChild(tr);
        });
      }
      document.getElementById('message').textContent = '';
      animateRows();
    } catch (err) {
      document.getElementById('message').textContent = 'Could not load subscriptions!';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    fetchSubscriptions();
    setInterval(fetchSubscriptions, 10000);
  });
</script>
</body>
</html>
