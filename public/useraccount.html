<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Account</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
      display: flex;
      background: linear-gradient(135deg, #2e1a47 0%, #3a2a6a 70%, #1ca7b8 100%);
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: rgba(38, 24, 66, 0.97);
      color: #e0e6f3;
      height: 100vh;
      position: fixed;
      overflow-y: auto;
      box-shadow: 2px 0 18px #6bd1e933;
      z-index: 10;
      transition: width 0.3s;
    }

    .sidebar h2 {
      text-align: center;
      padding: 28px 0 22px 0;
      margin: 0;
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
      color: #2e1a47;
      letter-spacing: 1px;
      border-bottom: 1px solid #6bd1e933;
      text-shadow: 0 0 10px #6bd1e944;
    }

    .sidebar h2 i {
      margin-right: 10px;
      color: #a16be9;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar ul li {
      border-bottom: 1px solid #3a2a6a;
    }

    .sidebar ul li a {
      color: #e0e6f3;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 15px 24px;
      font-size: 1.08rem;
      border-radius: 8px 20px 20px 8px;
      transition: background 0.22s, color 0.22s, box-shadow 0.22s;
      position: relative;
    }

    .sidebar ul li a i {
      margin-right: 14px;
      font-size: 1.18rem;
      color: #6bd1e9;
      min-width: 22px;
      text-align: center;
    }

    .sidebar ul li a:hover,
    .sidebar ul li a:focus {
      background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
      color: #2e1a47;
      box-shadow: 0 4px 18px #a16be955;
      outline: none;
    }

    .sidebar ul li a:hover i,
    .sidebar ul li a:focus i {
      color: #2e1a47;
    }

    .sidebar ul li:last-child {
      border-bottom: none;
    }

    /* Main content */
    .container {
      margin-left: 240px;
      padding: 40px 32px;
      width: 100%;
      min-height: 100vh;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .container h1 {
      margin-bottom: 24px;
      color: #6bd1e9;
      font-size: 2.2rem;
      letter-spacing: 1px;
      text-shadow: 0 0 12px #6bd1e944;
    }

    #account-details {
      background: rgba(255,255,255,0.96);
      padding: 32px 28px;
      border-radius: 18px;
      box-shadow: 0 4px 24px #6bd1e933;
      width: 100%;
      max-width: 520px;
      margin-bottom: 32px;
    }

    #account-details h2 {
      margin-bottom: 24px;
      color: #3a2a6a;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    form input,
    form select,
    form textarea {
      width: 100%;
      padding: 13px 14px;
      margin-bottom: 18px;
      border-radius: 8px;
      border: 1.5px solid #6bd1e988;
      font-size: 1rem;
      background: rgba(107, 209, 233, 0.08);
      color: #2e1a47;
      transition: border-color 0.3s, box-shadow 0.22s;
      box-sizing: border-box;
      font-family: 'Poppins', Arial, sans-serif;
      opacity: 1 !important;
    }

    form input:focus,
    form select:focus,
    form textarea:focus {
      border-color: #a16be9;
      box-shadow: 0 0 10px #a16be9aa;
      outline: none;
      background: rgba(107, 209, 233, 0.16);
    }

    form button {
      padding: 12px 28px;
      background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
      color: #271a48;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 4px 14px #6bd1e966;
      transition: background 0.3s, transform 0.18s, box-shadow 0.23s;
      letter-spacing: 1.1px;
      text-shadow: 0 0 6px #fff4;
    }

    form button:hover,
    form button:focus {
      background: linear-gradient(90deg, #a16be9 0%, #6bd1e9 100%);
      color: #fff;
      transform: scale(1.04) translateY(-2px);
      box-shadow: 0 8px 24px #a16be988;
      outline: none;
    }

    #logout-btn {
      margin-top: 16px;
      background: linear-gradient(90deg, #e74c3c 0%, #f39c12 100%);
      color: #fff;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      font-size: 1.08rem;
      padding: 12px 28px;
      cursor: pointer;
      box-shadow: 0 4px 14px #e74c3c44;
      transition: background 0.3s, box-shadow 0.23s, transform 0.16s;
    }

    #logout-btn:hover,
    #logout-btn:focus {
      background: linear-gradient(90deg, #c0392b 0%, #f1c40f 100%);
      color: #fff;
      transform: scale(1.03) translateY(-1px);
      box-shadow: 0 8px 22px #e74c3c66;
      outline: none;
    }

    /* Fade-in animation */
    .fade-in {
      animation: fadeInUp 0.5s ease forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar {
        width: 70px;
        min-width: 70px;
      }
      .sidebar h2,
      .sidebar ul li a span {
        display: none;
      }
      .container {
        margin-left: 70px;
        padding: 24px 8px;
      }
      #account-details {
        padding: 20px 10px;
      }
    }

    @media (max-width: 600px) {
      .sidebar {
        position: fixed;
        width: 100vw;
        min-width: 0;
        height: 60px;
        min-height: 0;
        flex-direction: row;
        align-items: center;
        top: 0;
        left: 0;
        box-shadow: 0 2px 14px #6bd1e933;
        z-index: 15;
      }
      .sidebar h2 {
        display: none;
      }
      .sidebar ul {
        display: flex;
        flex-direction: row;
        width: 100vw;
        justify-content: space-around;
        align-items: center;
      }
      .sidebar ul li {
        margin: 0;
        border-bottom: none;
      }
      .sidebar ul li a {
        border-radius: 10px;
        padding: 0.5rem 0.5rem;
        font-size: 1.08rem;
      }
      .container {
        margin-left: 0;
        margin-top: 70px;
        padding: 1.2rem 0.5rem;
      }
      #account-details {
        max-width: 100vw;
        padding: 12px 2px;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2><i class="fas fa-broadcast-tower"></i>CABLE USER DASHBOARD</h2>
    <ul>
       <li><a href="userdashboard.html"><i class="fas fa-users"></i><span>Dashboard</span></a></li>
      <li><a href="useraccount.html"><i class="fas fa-user"></i> <span>Profile</span></a></li>
      <li><a href="userbillings.html"><i class="fas fa-file-invoice-dollar"></i> <span>Billing</span></a></li>
      <li><a href="userpackage.html"><i class="fas fa-sliders-h"></i> <span>Packages</span></a></li>
      <li><a href="viewreceipts.html"><i class="fas fa-receipt"></i> <span>Your Receipts</span></a></li> 
      <li><a href="usercomplaints.html"><i class="fas fa-comment-dots"></i> <span>Complaint Box</span></a></li>
      <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li> 
    </ul>
  </div>

  <!-- Main Content -->
  <div class="container">
    <h1>User Account</h1>

    <div id="account-details">
      <h2>Account Overview</h2>
      <form id="account-form">
        <input type="text" id="name" name="name" placeholder="Name" required>
        <input type="email" id="email" name="email" placeholder="Email" required>
        <input type="text" id="phone" name="phone" placeholder="Phone" required>
        <input type="text" id="address" name="address" placeholder="Address" required>
        <input type="text" id="city" name="city" placeholder="City" required>
        <input type="text" id="zip" name="zip" placeholder="ZIP Code" required>
        <input type="text" id="package" name="package" placeholder="Package" required>
        <input type="date" id="connectionDate" name="connectionDate" placeholder="Connection Date" required>
        <button type="submit" id="update-btn">Update</button>
      </form>
    </div>

    <button id="logout-btn">Logout</button>
  </div>

  <script>
    // Fetch user data and populate form with animations
    function fetchUserData() {
      fetch('/get-user-details')
        .then(response => response.json())
        .then(data => {
          if (data.message) {
            alert(data.message);
            window.location.href = '/userlogin.html';
          } else {
            const fields = [
              { id: 'name', value: data.name || '' },
              { id: 'email', value: data.email || '' },
              { id: 'phone', value: data.phone || '' },
              { id: 'address', value: data.address || '' },
              { id: 'city', value: data.city || '' },
              { id: 'zip', value: data.zip || '' },
              { id: 'package', value: data.package || '' },
              { id: 'connectionDate', value: data.connectionDate ? new Date(data.connectionDate).toISOString().split('T')[0] : '' }
            ];

            fields.forEach((field, index) => {
              const element = document.getElementById(field.id);
              setTimeout(() => {
                element.value = field.value;
                element.classList.add('fade-in');
              }, index * 150); // Delay of 150ms per field
            });
          }
        })
        .catch(error => {
          console.error('Error fetching user details:', error);
          alert('Failed to fetch user details.');
        });
    }

    // Update user details
    function updateUserDetails(event) {
      event.preventDefault();

      const updatedData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        zip: document.getElementById('zip').value,
        package: document.getElementById('package').value,
        connectionDate: document.getElementById('connectionDate').value
      };

      fetch('/update-user', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(updatedData)
      })
      .then(response => response.json())
      .then(data => {
        alert(data.message || 'Account updated successfully!');
      })
      .catch(error => {
        console.error('Error updating user:', error);
        alert('Failed to update user details.');
      });
    }

    // Logout
    function logout() {
      fetch('/logout')
        .then(() => window.location.href = '/')
        .catch(error => console.error('Error during logout:', error));
    }

    document.getElementById('account-form').addEventListener('submit', updateUserDetails);
    document.getElementById('logout-btn').addEventListener('click', logout);

    window.onload = fetchUserData;
  </script>
</body>
</html>
