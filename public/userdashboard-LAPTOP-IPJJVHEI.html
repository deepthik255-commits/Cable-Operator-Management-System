<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cable Operator User Dashboard</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      /* Set your background image here! */
      background: url('indeximg.jpeg') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }
    /* Overlay gradient for readability */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(135deg, #2e1a47cc 0%, #3a2a6acc 70%, #1ca7b8cc 100%);
      /* 'cc' is hex for 80% opacity */
    }
    /* Ensure all content is above the overlay */
    .sidebar, .main-content {
      position: relative;
      z-index: 1;
    }

    /* Sidebar styles */
    .sidebar {
      width: 260px;
      background: rgba(38, 24, 66, 0.97);
      color: #e0e6f3;
      min-height: 100vh;
      box-shadow: 2px 0 18px #6bd1e933;
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 10;
      transition: width 0.3s;
    }
    .sidebar h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #6bd1e9;
      padding: 1.7rem 1.2rem 1.2rem 1.2rem;
      margin: 0;
      letter-spacing: 1px;
      border-bottom: 1px solid #6bd1e933;
      text-shadow: 0 0 10px #6bd1e944;
    }
    .sidebar h2 i {
      margin-right: 12px;
      color: #a16be9;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .sidebar ul li {
      margin: 0.7rem 0;
    }
    .sidebar ul li a {
      display: flex;
      align-items: center;
      color: #e0e6f3;
      text-decoration: none;
      font-size: 1.08rem;
      padding: 0.85rem 1.5rem;
      border-radius: 8px 20px 20px 8px;
      transition: background 0.22s, color 0.22s, box-shadow 0.22s;
      position: relative;
    }
    .sidebar ul li a i {
      margin-right: 14px;
      font-size: 1.18rem;
      color: #6bd1e9;
      min-width: 22px;
      text-align: center;
    }
    .sidebar ul li a:hover,
    .sidebar ul li a:focus {
      background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
      color: #2e1a47;
      box-shadow: 0 4px 18px #a16be955;
      outline: none;
    }
    .sidebar ul li a:hover i,
    .sidebar ul li a:focus i {
      color: #2e1a47;
    }

    /* Main content styles */
    .main-content {
      margin-left: 260px;
      padding: 3.5rem 2.5rem;
      flex: 1;
      min-height: 100vh;
      color: #f3f7fa;
      background: transparent;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
    }
    .main-content h1 {
      font-size: 2.3rem;
      margin-bottom: 1.3rem;
      color: #6bd1e9;
      letter-spacing: 1.2px;
      text-shadow: 0 0 12px #6bd1e944;
    }
    .main-content p {
      font-size: 1.15rem;
      color: #e0e6f3;
      margin-bottom: 0;
      opacity: 0.93;
    }

    /* Responsive design */
    @media (max-width: 900px) {
      .sidebar {
        width: 70px;
        min-width: 70px;
      }
      .sidebar h2 {
        font-size: 1.1rem;
        padding: 1rem 0.5rem;
        text-align: center;
      }
      .sidebar ul li a {
        justify-content: center;
        padding: 0.85rem 0.5rem;
        font-size: 1.08rem;
      }
      .sidebar ul li a span {
        display: none;
      }
      .main-content {
        margin-left: 70px;
        padding: 2rem 1rem;
      }
    }
    @media (max-width: 600px) {
      .sidebar {
        position: fixed;
        width: 100vw;
        min-width: 0;
        height: 60px;
        min-height: 0;
        flex-direction: row;
        align-items: center;
        top: 0;
        left: 0;
        box-shadow: 0 2px 14px #6bd1e933;
        z-index: 15;
      }
      .sidebar h2 {
        display: none;
      }
      .sidebar ul {
        display: flex;
        flex-direction: row;
        width: 100vw;
        justify-content: space-around;
        align-items: center;
      }
      .sidebar ul li {
        margin: 0;
      }
      .sidebar ul li a {
        border-radius: 10px;
        padding: 0.5rem 0.5rem;
        font-size: 1.08rem;
      }
      .main-content {
        margin-left: 0;
        margin-top: 70px;
        padding: 1.2rem 0.5rem;
      }
    }
  </style>
</head>
<body>

      <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li> 
    </ul>
  </div>
</div>

</body>
</html>
