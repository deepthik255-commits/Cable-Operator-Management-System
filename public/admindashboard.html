<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cable Operator Admin Dashboard</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
  font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #2e1a47 0%, #3a2a6a 70%, #1ca7b8 100%);
  margin: 0;
  min-height: 100vh;
  display: flex;
}

/* Sidebar Styling */
.sidebar {
  width: 240px;
  background: rgba(38, 24, 66, 0.97);
  color: #e0e6f3;
  height: 100vh;
  position: fixed;
  left: 0;
  top: 0;
  overflow-y: auto;
  box-shadow: 2px 0 18px #6bd1e933;
  z-index: 10;
  transition: width 0.3s;
}

.sidebar h2 {
  text-align: center;
  padding: 28px 0 22px 0;
  margin: 0;
  font-size: 1.6rem;
  font-weight: 700;
  background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
  color: #2e1a47;
  letter-spacing: 1px;
  border-bottom: 1px solid #6bd1e933;
  text-shadow: 0 0 10px #6bd1e944;
}

.sidebar h2 i {
  margin-right: 10px;
  color: #a16be9;
}

.sidebar ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

.sidebar ul li {
  border-bottom: 1px solid #3a2a6a;
}

.sidebar ul li a {
  color: #e0e6f3;
  text-decoration: none;
  display: flex;
  align-items: center;
  padding: 15px 24px;
  font-size: 1.08rem;
  border-radius: 8px 20px 20px 8px;
  transition: background 0.22s, color 0.22s, box-shadow 0.22s;
  position: relative;
}

.sidebar ul li a i {
  margin-right: 14px;
  font-size: 1.18rem;
  color: #6bd1e9;
  min-width: 22px;
  text-align: center;
}

.sidebar ul li a:hover,
.sidebar ul li a:focus {
  background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
  color: #2e1a47;
  box-shadow: 0 4px 18px #a16be955;
  outline: none;
}

.sidebar ul li a:hover i,
.sidebar ul li a:focus i {
  color: #2e1a47;
}

.sidebar ul li:last-child {
  border-bottom: none;
}

/* Main Content Alignment */
.main-content {
  margin-right: 0px;
  min-height: 100vh;
  background: transparent;
  box-sizing: border-box;
  width: 100%;
  padding: 40px 0 40px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Heading */
.main-content h2 {
  color: #6bd1e9;
  font-size: 2rem;
  letter-spacing: 1.2px;
  margin-bottom: 32px;
  text-shadow: 0 0 8px #6bd1e955;
  text-align: center;
  width: 100%;
}

/* Receipts List Alignment */
.receipts-list {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 32px;
  align-items: center;
  margin-bottom: 32px;
}

/* Receipt Card Styling */
.receipt-card {
  background: rgba(255,255,255,0.97);
  color: #2e1a47;
  border-radius: 18px;
  box-shadow: 0 8px 32px #6bd1e955, 0 0 0 2px #a16be933;
  padding: 28px 28px 22px 28px;
  width: 100%;
  max-width: 520px;
  font-size: 1.09rem;
  line-height: 1.7;
  word-break: break-word;
  box-sizing: border-box;
  position: relative;
  transition: box-shadow 0.2s, transform 0.2s;
  z-index: 2;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.receipt-card .receipt-date {
  color: #888;
  font-size: 0.98rem;
  margin-bottom: 6px;
  text-align: right;
}

.receipt-card .receipt-header {
  font-weight: 600;
  color: #6bd1e9;
  font-size: 1.18rem;
  margin-bottom: 6px;
  text-align: center;
}

.receipt-card .receipt-details {
  margin-bottom: 10px;
}

.receipt-card .receipt-details div {
  margin: 2px 0;
}

.receipt-card .packs-list {
  margin: 0;
  padding: 0;
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.receipt-card .packs-list li {
  background: #e9ecef;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 0.98rem;
  color: #3a2a6a;
  border: 1px solid #a16be933;
}

.receipt-card .receipt-summary {
  margin-top: 6px;
  padding: 10px 0;
  border-top: 1px solid #e3e8f0;
  border-bottom: 1px solid #e3e8f0;
  background: #f8f9fa;
  border-radius: 8px;
}

.receipt-card .receipt-summary div {
  margin: 4px 0;
}

.receipt-card .receipt-total {
  text-align: right;
  font-size: 1.13rem;
  color: #a16be9;
  font-weight: bold;
  margin-top: 8px;
  text-shadow: 0 0 6px #6bd1e933;
}

.no-receipts {
  color: #e74c3c;
  text-align: center;
  margin: 20px 0;
  font-size: 1.13rem;
  font-weight: 500;
  min-height: 22px;
}

.back-btn {
  display: inline-block;
  background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
  color: #2e1a47;
  border: none;
  padding: 12px 30px;
  border-radius: 8px;
  font-size: 1.09rem;
  font-weight: 600;
  text-decoration: none;
  box-shadow: 0 4px 14px #6bd1e966;
  margin-top: 12px;
  margin-bottom: 20px;
  transition: background 0.3s, color 0.2s, transform 0.18s, box-shadow 0.23s;
}

.back-btn:hover,
.back-btn:focus {
  background: linear-gradient(90deg, #a16be9 0%, #6bd1e9 100%);
  color: #fff;
  transform: scale(1.03) translateY(-2px);
  box-shadow: 0 8px 24px #a16be988;
  outline: none;
}

/* Responsive adjustments */
@media (max-width: 900px) {
  .sidebar {
    width: 70px;
    min-width: 70px;
  }
  .sidebar h2,
  .sidebar ul li a span {
    display: none;
  }
  .main-content {
    margin-left: 90px;
    padding: 24px 0;
  }
  .receipts-list {
    max-width: 98vw;
    gap: 18px;
  }
  .receipt-card {
    padding: 18px 8px 14px 8px;
    max-width: 98vw;
  }
}

@media (max-width: 600px) {
  .sidebar {
    position: fixed;
    width: 100vw;
    min-width: 0;
    height: 60px;
    min-height: 0;
    flex-direction: row;
    align-items: center;
    top: 0;
    left: 0;
    box-shadow: 0 2px 14px #6bd1e933;
    z-index: 15;
  }
  .sidebar h2 {
    display: none;
  }
  .sidebar ul {
    display: flex;
    flex-direction: row;
    width: 100vw;
    justify-content: space-around;
    align-items: center;
  }
  .sidebar ul li {
    margin: 0;
    border-bottom: none;
  }
  .sidebar ul li a {
    border-radius: 10px;
    padding: 0.5rem 0.5rem;
    font-size: 1.08rem;
  }
  .main-content {
    margin-left: 0;
    margin-top: 70px;
    padding: 1.2rem 0.5rem;
    align-items: stretch;
  }
  .receipts-list {
    max-width: 100vw;
    gap: 10px;
  }
  .receipt-card {
    padding: 10px 4px 10px 4px;
    max-width: 100vw;
  }
  .back-btn {
    width: 100%;
    margin-bottom: 12px;
  }
}

  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2><i class="fas fa-broadcast-tower"></i> ADMIN PANEL</h2>
  <ul>
    <li><a href="admincustomers.html"><i class="fas fa-users"></i><span>Customers</span></a></li>
    <li><a href="admincustomerreceipt.html"><i class="fas fa-receipt"></i><span>Customer Receipt</span></a></li>
    <li><a href="adminpackage.html"><i class="fas fa-box"></i><span>Packages</span></a></li>
    <li><a href="admincomplaints.html"><i class="fas fa-exclamation-circle"></i><span>Customer Complaint</span></a></li>
    <li><a href="/logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li> 
  </ul>
</div>

<!-- Main Content -->
<div class="main-content">
  <div class="dashboard-header">
    <h1> SB CABLE NETWORKS</h1>
  </div>
  <div class="charts-wrapper">
    <!-- Chart: Packages per Month -->
    <div class="chart-section">
      <h3>Total Packages Subscribed (Last 12 Months)</h3>
      <canvas id="packagesPerMonthChart" width="600" height="250"></canvas>
      <div id="chart-error"></div>
      <div style="text-align:center;">
        <button class="refresh-btn" onclick="fetchAndRenderChart()">Refresh Chart</button>
      </div>
    </div>

    <!-- Chart: Subscriptions by DTH Provider -->
    <div class="chart-section">
      <h3>Subscriptions by DTH Provider</h3>
      <canvas id="subsByProviderChart" width="600" height="250"></canvas>
      <div id="provider-chart-error"></div>
      <div style="text-align:center;">
        <button class="refresh-btn" onclick="fetchAndRenderProviderChart()">Refresh Chart</button>
      </div>
    </div>

    <!-- Chart: Revenue per Month -->
    <div class="chart-section">
      <h3>Revenue Generated (Last 12 Months)</h3>
      <canvas id="revenuePerMonthChart" width="600" height="250"></canvas>
      <div id="revenue-chart-error"></div>
      <div style="text-align:center;">
        <button class="refresh-btn" onclick="fetchAndRenderRevenueChart()">Refresh Chart</button>
      </div>
    </div>
     <!-- Solved or pending -->
    <div class="chart-section">
  <h3>Complaints Status by Employee</h3>
  <table id="complaintsByEmployeeTable" style="width:100%;margin-bottom:24px;">
    <thead>
      <tr>
        <th>Complaint Name</th>
        <th>Employee</th>
        <th>Solved</th>
        <th>Pending</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data will be injected here -->
    </tbody>
  </table>
  <canvas id="complaintsByEmployeeChart" width="600" height="250"></canvas>
  <div id="complaints-employee-chart-error"></div>
  <div style="text-align:center;">
    <button class="refresh-btn" onclick="fetchAndRenderComplaintsByEmployee()">Refresh Chart</button>
  </div>
</div>

  </div>
</div>

<script>
let packagesChart = null;
let providerChart = null;
let revenueChart = null;

function renderPackagesChart(stats) {
  const ctx = document.getElementById('packagesPerMonthChart').getContext('2d');
  if (packagesChart) packagesChart.destroy();
  packagesChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: stats.labels,
      datasets: [{
        label: 'Packages Subscribed',
        data: stats.data,
        backgroundColor: '#007bff'
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 } }
      }
    }
  });
}

function fetchAndRenderChart() {
  document.getElementById('chart-error').textContent = '';
  fetch('/api/stats/packages-per-month')
    .then(res => {
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res.json();
    })
    .then(stats => {
      if (!stats.labels || !stats.data) throw new Error('No data received');
      renderPackagesChart(stats);
    })
    .catch(err => {
      document.getElementById('chart-error').textContent = 'Error loading chart: ' + err.message;
      console.error('Error loading chart:', err);
    });
}

function renderProviderChart(stats) {
  const ctx = document.getElementById('subsByProviderChart').getContext('2d');
  if (providerChart) providerChart.destroy();
  providerChart = new Chart(ctx, {
    type: 'bar', // Change to 'pie' for a pie chart
    data: {
      labels: stats.labels,
      datasets: [{
        label: 'Subscriptions',
        data: stats.data,
        backgroundColor: [
          '#007bff', '#28a745', '#ffc107', '#dc3545', '#17a2b8', '#6c757d', '#8e44ad', '#e67e22'
        ]
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 } }
      }
    }
  });
}

function fetchAndRenderProviderChart() {
  document.getElementById('provider-chart-error').textContent = '';
  fetch('/api/stats/subscriptions-by-provider')
    .then(res => {
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res.json();
    })
    .then(stats => {
      if (!stats.labels || !stats.data) throw new Error('No data received');
      renderProviderChart(stats);
    })
    .catch(err => {
      document.getElementById('provider-chart-error').textContent = 'Error loading chart: ' + err.message;
      console.error('Error loading provider chart:', err);
    });
}

function renderRevenueChart(stats) {
  const ctx = document.getElementById('revenuePerMonthChart').getContext('2d');
  if (revenueChart) revenueChart.destroy();
  revenueChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: stats.labels,
      datasets: [{
        label: 'Revenue (₹)',
        data: stats.data,
        backgroundColor: 'rgba(40,167,69,0.15)',
        borderColor: '#28a745',
        borderWidth: 3,
        pointBackgroundColor: '#28a745',
        pointRadius: 5,
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: true } },
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            callback: function(val) { return '₹' + val; }
          }
        }
      }
    }
  });
}

function fetchAndRenderRevenueChart() {
  document.getElementById('revenue-chart-error').textContent = '';
  fetch('/api/stats/revenue-per-month')
    .then(res => {
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res.json();
    })
    .then(stats => {
      if (!stats.labels || !stats.data) throw new Error('No data received');
      renderRevenueChart(stats);
    })
    .catch(err => {
      document.getElementById('revenue-chart-error').textContent = 'Error loading chart: ' + err.message;
      console.error('Error loading revenue chart:', err);
    });
}

document.addEventListener('DOMContentLoaded', function() {
  fetchAndRenderChart();
  fetchAndRenderProviderChart();
  fetchAndRenderRevenueChart();
});

let complaintsByEmployeeChart = null;

function renderComplaintsByEmployeeTable(data) {
  // Sort by solved complaints, descending
  data.sort((a, b) => b.solved - a.solved);

  const tbody = document.querySelector('#complaintsByEmployeeTable tbody');
  tbody.innerHTML = '';
  data.forEach(row => {
    // Display all complaint categories as a comma-separated list
    const complaintNames = row.complaints ? row.complaints.join(', ') : '';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${complaintNames}</td>
      <td>${row.employee}</td>
      <td>${row.solved}</td>
      <td>${row.pending}</td>
    `;
    tbody.appendChild(tr);
  });
}



function renderComplaintsByEmployeeChart(data) {
  const ctx = document.getElementById('complaintsByEmployeeChart').getContext('2d');
  if (complaintsByEmployeeChart) complaintsByEmployeeChart.destroy();
  complaintsByEmployeeChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.employee),
      datasets: [
        {
          label: 'Solved',
          data: data.map(d => d.solved),
          backgroundColor: '#28a745'
        },
        {
          label: 'Pending',
          data: data.map(d => d.pending),
          backgroundColor: '#ffc107'
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: true } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 } }
      }
    }
  });
}

function fetchAndRenderComplaintsByEmployee() {
  document.getElementById('complaints-employee-chart-error').textContent = '';
  fetch('/api/stats/complaints-by-employee')
    .then(res => {
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res.json();
    })
    .then(data => {
      renderComplaintsByEmployeeTable(data);
      renderComplaintsByEmployeeChart(data);
    })
    .catch(err => {
      document.getElementById('complaints-employee-chart-error').textContent = 'Error loading complaints data: ' + err.message;
      console.error('Error loading complaints by employee:', err);
    });
}

// Call this function on page load
document.addEventListener('DOMContentLoaded', function() {
  fetchAndRenderComplaintsByEmployee();
});

</script>
</body>
</html>
