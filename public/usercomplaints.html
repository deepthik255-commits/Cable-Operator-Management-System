<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Complaints</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
   body {
  font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #2e1a47 0%, #3a2a6a 70%, #1ca7b8 100%);
  min-height: 100vh;
  margin: 0;
  display: flex;
}

/* Sidebar Styling */
.sidebar {
  width: 240px;
  background: rgba(38, 24, 66, 0.97);
  color: #e0e6f3;
  height: 100vh;
  position: fixed;
  left: 0;
  top: 0;
  overflow-y: auto;
  box-shadow: 2px 0 18px #6bd1e933;
  z-index: 10;
  transition: width 0.3s;
}

.sidebar h2 {
  text-align: center;
  padding: 28px 0 22px 0;
  margin: 0;
  font-size: 1.6rem;
  font-weight: 700;
  background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
  color: #2e1a47;
  letter-spacing: 1px;
  border-bottom: 1px solid #6bd1e933;
  text-shadow: 0 0 10px #6bd1e944;
}

.sidebar h2 i {
  margin-right: 10px;
  color: #a16be9;
}

.sidebar ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

.sidebar ul li {
  border-bottom: 1px solid #3a2a6a;
}

.sidebar ul li a {
  color: #e0e6f3;
  text-decoration: none;
  display: flex;
  align-items: center;
  padding: 15px 24px;
  font-size: 1.08rem;
  border-radius: 8px 20px 20px 8px;
  transition: background 0.22s, color 0.22s, box-shadow 0.22s;
  position: relative;
}

.sidebar ul li a i {
  margin-right: 14px;
  font-size: 1.18rem;
  color: #6bd1e9;
  min-width: 22px;
  text-align: center;
}

.sidebar ul li a:hover,
.sidebar ul li a:focus {
  background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
  color: #2e1a47;
  box-shadow: 0 4px 18px #a16be955;
  outline: none;
}

.sidebar ul li a:hover i,
.sidebar ul li a:focus i {
  color: #2e1a47;
}

.sidebar ul li:last-child {
  border-bottom: none;
}

/* Main Content */
.main-content {
  margin-left: 240px;
  padding: 40px 3vw 40px 3vw;
  width: 100%;
  min-height: 100vh;
  background: transparent;
  box-sizing: border-box;
}

/* Complaint Container (Glassy Card) */
.complaint-container {
  background: rgba(255,255,255,0.97);
  padding: 36px 28px 30px 28px;
  border-radius: 18px;
  box-shadow: 0 8px 32px #6bd1e955, 0 0 0 2px #a16be933;
  max-width: 700px;
  margin: 0 auto;
}

.complaint-container h1 {
  margin-bottom: 28px;
  font-size: 2rem;
  color: #6bd1e9;
  letter-spacing: 1.2px;
  font-weight: 700;
  text-align: center;
  text-shadow: 0 0 8px #6bd1e955;
}

/* Form Styling */
form label {
  font-weight: 600;
  color: #3a2a6a;
  margin-bottom: 7px;
  display: block;
  letter-spacing: 0.5px;
}

form input, form select, form textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1.5px solid #6bd1e988;
  background: rgba(107,209,233,0.08);
  color: #2e1a47;
  font-size: 1rem;
  font-family: inherit;
  margin-bottom: 14px;
  box-sizing: border-box;
  transition: border-color 0.3s, box-shadow 0.2s;
}

form input:focus, form select:focus, form textarea:focus {
  border-color: #a16be9;
  box-shadow: 0 0 10px #a16be9aa;
  outline: none;
  background: rgba(107,209,233,0.16);
}

input[readonly] {
  background: #e9ecef;
  color: #333;
  opacity: 1;
}

form textarea {
  resize: vertical;
  min-height: 90px;
  max-height: 300px;
}

form button {
  padding: 13px 0;
  background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
  color: #271a48;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  font-size: 1.13rem;
  font-weight: 700;
  box-shadow: 0 4px 14px #6bd1e966;
  margin-top: 18px;
  letter-spacing: 1px;
  transition: background 0.3s, transform 0.18s, box-shadow 0.23s;
}

form button:disabled {
  background: #aaa;
  color: #fff;
  cursor: not-allowed;
  box-shadow: none;
}

form button:hover:not(:disabled),
form button:focus:not(:disabled) {
  background: linear-gradient(90deg, #a16be9 0%, #6bd1e9 100%);
  color: #fff;
  transform: scale(1.03) translateY(-2px);
  box-shadow: 0 8px 24px #a16be988;
  outline: none;
}

/* Complaint Status */
#complaintStatus p {
  margin: 13px 0 0 0;
  font-size: 1.09rem;
  font-weight: 500;
  text-align: center;
}

/* Complaints Table */
#complaintList h3 {
  margin-top: 38px;
  margin-bottom: 13px;
  color: #6bd1e9;
  font-size: 1.22rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  background: #f8fafc;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 14px #6bd1e911;
}

table thead {
  background: linear-gradient(90deg, #6bd1e9 0%, #a16be9 100%);
  color: white;
  font-size: 1.09rem;
}

table th, table td {
  padding: 14px 12px;
  border: none;
  text-align: left;
}

table th {
  font-weight: 600;
  letter-spacing: 0.5px;
}

table tr {
  border-bottom: 1px solid #e1e7ea;
}

table tr:nth-child(even) {
  background-color: #f2fdfb;
}

table tr:last-child {
  border-bottom: none;
}

/* Responsive adjustments */
@media (max-width: 900px) {
  .sidebar {
    width: 70px;
    min-width: 70px;
  }
  .sidebar h2,
  .sidebar ul li a span {
    display: none;
  }
  .main-content {
    margin-left: 90px;
    padding: 24px 8px;
  }
  .complaint-container {
    padding: 18px 7px;
    max-width: 98vw;
  }
}

@media (max-width: 700px) {
  .complaint-container {
    max-width: 98vw;
    padding: 20px 4vw 18px 4vw;
    border-radius: 12px;
    margin-left: 0;
  }
}

@media (max-width: 600px) {
  .sidebar {
    position: fixed;
    width: 100vw;
    min-width: 0;
    height: 60px;
    min-height: 0;
    flex-direction: row;
    align-items: center;
    top: 0;
    left: 0;
    box-shadow: 0 2px 14px #6bd1e933;
    z-index: 15;
  }
  .sidebar h2 {
    display: none;
  }
  .sidebar ul {
    display: flex;
    flex-direction: row;
    width: 100vw;
    justify-content: space-around;
    align-items: center;
  }
  .sidebar ul li {
    margin: 0;
    border-bottom: none;
  }
  .sidebar ul li a {
    border-radius: 10px;
    padding: 0.5rem 0.5rem;
    font-size: 1.08rem;
  }
  .main-content {
    margin-left: 0;
    margin-top: 70px;
    padding: 1.2rem 0.5rem;
  }
  .complaint-container {
    padding: 0.8rem 0.5rem 0.7rem 0.5rem;
    max-width: 100vw;
  }
  table th, table td {
    padding: 8px 4px;
    font-size: 0.98rem;
  }
}

@media (max-width: 500px) {
  .complaint-container {
    padding: 10px 2vw 10px 2vw;
    border-radius: 8px;
  }
  .complaint-container h1 {
    font-size: 1.25rem;
    margin-bottom: 18px;
  }
  #complaintList h3 {
    font-size: 1rem;
  }
  table th, table td {
    font-size: 0.95rem;
  }
  form button {
    font-size: 1rem;
    padding: 10px 0;
  }
}

  </style>
</head>
<body>

<!-- --- Sidebar --- -->
<div class="sidebar">
  <div>
    <h2><i class="fas fa-broadcast-tower"></i>CABLE USER DASHBOARD</h2>
    <ul>
       <li><a href="userdashboard.html"><i class="fas fa-users"></i><span>Dashboard</span></a></li>
      <li><a href="useraccount.html"><i class="fas fa-user"></i> <span>Profile</span></a></li>
      <li><a href="userbillings.html"><i class="fas fa-file-invoice-dollar"></i> <span>Billing</span></a></li>
      <li><a href="userpackage.html"><i class="fas fa-sliders-h"></i> <span>Packages</span></a></li>
      <li><a href="viewreceipts.html"><i class="fas fa-receipt"></i> <span>Your Receipts</span></a></li> 
      <li><a href="usercomplaints.html"><i class="fas fa-comment-dots"></i> <span>Complaint Box</span></a></li>
      <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li> 
    </ul>
  </div>
</div>


<!-- Main Content -->
<div class="main-content">
  <div class="complaint-container">
    <h1>User Complaint Box</h1>

    <form id="complaintForm" onsubmit="submitComplaint(event)">
    <input type="text" id="customerId" readonly>
    <input type="text" id="customerName" readonly>

      <label for="complaintCategory">Complaint Type</label>
      <select id="complaintCategory" required onchange="updateEmployeeName()">
        <option disabled selected value="">-- Select Category --</option>
        <option value="No Signal / Channel Not Working">No Signal / Channel Not Working</option>
        <option value="Poor Picture or Sound Quality">Poor Picture or Sound Quality</option>
        <option value="Set-Top Box Issues">Set-Top Box Issues</option>
        <option value="Billing or Payment Issues">Billing or Payment Issues</option>
        <option value="Package Subscription Issues">Package Subscription Issues</option>
        <option value="Late or Missed Service">Late or Missed Service</option>
        <option value="Remote Control Not Working">Remote Control Not Working</option>
        <option value="Customer Service Complaints">Customer Service Complaints</option>
        <option value="Internet Connectivity">Internet Connectivity</option>
        <option value="Request for Disconnection or Suspension">Request for Disconnection or Suspension</option>
        <option value="Others">Others</option>
      </select>

      <label for="employeeName">Assigned Employee</label>
      <input type="text" id="employeeName" readonly>

      <textarea id="complaintDetails" placeholder="Additional details (optional)..."></textarea>

      <button type="submit">Submit Complaint</button>
    </form>

    <div id="complaintStatus"></div>

    <div id="complaintList">
      <h3>Submitted Complaints:</h3>
      <table id="complaintTable">
        <thead>
          <tr>
            <th>Customer ID</th>
            <th>Name</th>
            <th>Complaint</th>
            <th>Assigned Employee</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const employeeMapping = {
    "No Signal / Channel Not Working": "Amit Sharma",
    "Poor Picture or Sound Quality": "Priya Gupta",
    "Set-Top Box Issues": "Ravi Kumar",
    "Billing or Payment Issues": "Neha Yadav",
    "Package Subscription Issues": "Arvind Patel",
    "Late or Missed Service": "Suresh Reddy",
    "Remote Control Not Working": "Deepika Joshi",
    "Customer Service Complaints": "Vikram Singh",
    "Internet Connectivity": "Sita Mehta",
    "Request for Disconnection or Suspension": "Rajesh Nair",
    "Others": "Kavita Desai"
  };

  async function getLoggedInUser() {
    try {
      const response = await fetch('/get-logged-in-user');
      const user = await response.json();
      if (user && user.customerId && user.name) {
        document.getElementById('customerId').value = user.customerId;
        document.getElementById('customerName').value = user.name;
      } else {
        document.getElementById('complaintStatus').innerHTML = "<p style='color:red;'>You are not logged in.</p>";
      }
    } catch (err) {
      console.error("Error fetching user data:", err);
      document.getElementById('complaintStatus').innerHTML = "<p style='color:red;'>Error fetching user data.</p>";
    }
  }

  function updateEmployeeName() {
    const category = document.getElementById('complaintCategory').value;
    document.getElementById('employeeName').value = employeeMapping[category] || "";
  }

  async function submitComplaint(event) {
    event.preventDefault();

    const customerId = document.getElementById('customerId').value.trim();
    const customerName = document.getElementById('customerName').value.trim();
    const complaintCategory = document.getElementById('complaintCategory').value;
    const complaintDetails = document.getElementById('complaintDetails').value.trim();
    const complaintText = complaintCategory + (complaintDetails ? ": " + complaintDetails : "");
    const employeeName = document.getElementById('employeeName').value;

    if (!customerId || !customerName || !complaintCategory) {
      document.getElementById('complaintStatus').innerHTML = "<p style='color:red;'>All fields are required!</p>";
      return;
    }

    try {
      const response = await fetch('/submit-complaint', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          customerId,
          customerName,
          complaintText,
          complaintCategory,
          employeeName
        })
      });

      const result = await response.json();

      if (response.ok) {
        document.getElementById('complaintStatus').innerHTML = "<p style='color:green;'>Complaint submitted successfully.</p>";
        document.getElementById('complaintForm').reset();
        document.getElementById('employeeName').value = "";
        loadComplaints();
      } else {
        document.getElementById('complaintStatus').innerHTML = `<p style='color:red;'>${result.message}</p>`;
      }
    } catch (err) {
      console.error(err);
      document.getElementById('complaintStatus').innerHTML = "<p style='color:red;'>Server error.</p>";
    }
  }

  async function loadComplaints() {
    try {
      const res = await fetch('/get-complaints');
      const complaints = await res.json();
      const tbody = document.querySelector('#complaintTable tbody');
      tbody.innerHTML = '';

      complaints.forEach(c => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${c.customerId}</td>
          <td>${c.customerName}</td>
          <td>${c.complaintText}</td>
          <td>${c.employeeName || 'Not Assigned'}</td>
          <td>${c.status || 'Pending'}</td>
        `;
        tbody.appendChild(row);
      });
    } catch (err) {
      console.error("Failed to load complaints:", err);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    getLoggedInUser();
    loadComplaints();
  });
</script>

</body>
</html>
