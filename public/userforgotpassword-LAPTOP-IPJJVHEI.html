<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password - Cable Management</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .reset-container {
      background: #fff;
      padding: 2.5rem 2rem 2rem 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(44, 62, 80, 0.15);
      width: 100%;
      max-width: 400px;
      transition: box-shadow 0.3s;
    }
    .reset-container:hover {
      box-shadow: 0 12px 40px rgba(44, 62, 80, 0.22);
    }
    .reset-container h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: #357ab8;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    .input-group {
      margin-bottom: 1.3rem;
    }
    label {
      display: block;
      margin-bottom: 7px;
      color: #357ab8;
      font-weight: 500;
      font-size: 1rem;
    }
    input {
      width: 100%;
      padding: 0.8rem 0.9rem;
      border: 1.5px solid #b5c7d3;
      border-radius: 8px;
      font-size: 1rem;
      background: #f7fbff;
      color: #22313f;
      transition: border 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border: 1.5px solid #4a90e2;
      box-shadow: 0 0 0 2px #e0eafc;
    }
    button {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(90deg, #4a90e2 60%, #357ab8 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      margin-top: 1rem;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(74, 144, 226, 0.10);
      transition: background 0.3s, box-shadow 0.2s;
    }
    button:hover {
      background: linear-gradient(90deg, #357ab8 60%, #4a90e2 100%);
      box-shadow: 0 4px 16px rgba(74, 144, 226, 0.16);
    }
    .back-to-login {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-to-login a {
      color: #357ab8;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .back-to-login a:hover {
      color: #4a90e2;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="reset-container">
  <h2>Reset Password</h2>
  <form action="/user/reset-password" method="POST">
    <div class="input-group">
      <label for="email">Registered Email</label>
      <input type="email" name="email" id="email" required />
    </div>
    <div class="input-group">
      <label for="newPassword">New Password</label>
      <input type="password" name="newPassword" id="newPassword" required />
    </div>
    <div class="input-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" name="confirmPassword" id="confirmPassword" required />
    </div>
    <button type="submit">Reset Password</button>
    <div class="back-to-login">
      <a href="/userlogin.html">Back to Login</a>
    </div>
  </form>
</div>

</body>
</html>
